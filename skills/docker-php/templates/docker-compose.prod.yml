# docker-compose.prod.yml — Production overrides
services:
  php-fpm:
    build: { target: prod }
    volumes: []
    environment: [APP_ENV=production, APP_DEBUG=false]
    restart: unless-stopped
    deploy: { resources: { limits: { memory: 512M, cpus: "1.0" } } }

  nginx:
    build: { context: ., dockerfile: docker/nginx/Dockerfile }
    volumes: []
    restart: unless-stopped

  worker:
    build: { context: ., dockerfile: docker/php/Dockerfile, target: worker }
    environment: [APP_ENV=production, APP_DEBUG=false]
    restart: unless-stopped
    depends_on: [php-fpm, redis]
    deploy: { replicas: 2, resources: { limits: { memory: 256M } } }

  scheduler:
    build: { context: ., dockerfile: docker/php/Dockerfile, target: scheduler }
    environment: [APP_ENV=production, APP_DEBUG=false]
    restart: unless-stopped
    depends_on: [php-fpm]

  mysql:
    restart: unless-stopped
  redis:
    restart: unless-stopped
