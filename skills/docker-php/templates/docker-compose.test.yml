# docker-compose.test.yml — CI overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm test
services:
  test:
    build: { context: ., dockerfile: docker/php/Dockerfile, target: test }
    environment: [APP_ENV=testing, DB_CONNECTION=sqlite, "DB_DATABASE=:memory:"]
    networks: [app]

  mysql:
    profiles: [donotstart]
  redis:
    profiles: [donotstart]
